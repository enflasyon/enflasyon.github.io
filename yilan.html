<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Yılan</title>
<style>
  :root{
    --lcd-bg:#c5d6a4;
    --lcd-dark:#26301a;
    --lcd-mid:#5a6b42;
    --body-dark:#23262b;
    --body-mid:#31353c;
    --body-light:#4a4f58;
    --accent:#8fa3c7;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:radial-gradient(circle at 50% 20%, #3a3f47 0%, #1b1d21 70%);
    display:flex;align-items:center;justify-content:center;
    font-family:"Courier New",monospace;
    touch-action:none;
    overflow:hidden;
  }
  .phone{
    background:linear-gradient(160deg,var(--body-light),var(--body-dark));
    border-radius:34px 34px 46px 46px;
    padding:22px 18px 26px;
    box-shadow:0 18px 50px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.15);
    max-width:380px;width:94vw;
  }
  .brand{
    text-align:center;color:#b9c1cf;letter-spacing:.35em;
    font-size:11px;font-weight:bold;margin-bottom:10px;text-transform:uppercase;
  }
  .screen-frame{
    background:#14161a;border-radius:14px;padding:10px;
    box-shadow:inset 0 3px 8px rgba(0,0,0,.8);
  }
  .lcd{
    background:var(--lcd-bg);border-radius:6px;position:relative;overflow:hidden;
  }
  .lcd::after{ /* pixel-grid sheen */
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      repeating-linear-gradient(0deg,rgba(38,48,26,.06) 0 1px,transparent 1px 4px),
      repeating-linear-gradient(90deg,rgba(38,48,26,.06) 0 1px,transparent 1px 4px),
      linear-gradient(120deg,rgba(255,255,255,.12),transparent 40%);
  }
  .hud{
    display:flex;justify-content:space-between;align-items:center;
    padding:6px 10px 4px;color:var(--lcd-dark);
    font-size:13px;font-weight:bold;
    border-bottom:2px solid var(--lcd-dark);
  }
  canvas{display:block;width:100%;image-rendering:pixelated;}
  .overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:8px;
    color:var(--lcd-dark);text-align:center;z-index:2;
    background:rgba(197,214,164,.88);
  }
  .overlay h1{font-size:26px;letter-spacing:.2em;}
  .overlay p{font-size:13px;line-height:1.5;}
  .overlay .blink{animation:blink 1.1s steps(2) infinite;font-weight:bold;}
  @keyframes blink{50%{opacity:0;}}
  .hidden{display:none;}

  .controls{
    margin-top:20px;display:grid;
    grid-template-columns:repeat(3,64px);grid-template-rows:repeat(3,54px);
    gap:8px;justify-content:center;
  }
  .btn{
    background:linear-gradient(180deg,#565c66,#3a3f47);
    border:none;border-radius:14px;color:#dfe4ec;font-size:20px;
    box-shadow:0 4px 0 #191b1f, inset 0 1px 0 rgba(255,255,255,.2);
    cursor:pointer;user-select:none;font-family:inherit;font-weight:bold;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #191b1f;}
  .btn.up{grid-area:1/2;} .btn.left{grid-area:2/1;}
  .btn.mid{grid-area:2/2;font-size:12px;letter-spacing:.1em;}
  .btn.right{grid-area:2/3;} .btn.down{grid-area:3/2;}
  .hint{
    text-align:center;color:#8b93a1;font-size:11px;margin-top:14px;line-height:1.5;
  }
  @media (prefers-reduced-motion: reduce){ .blink{animation:none;} }
</style>
</head>
<body>
<div class="phone">
  <div class="brand">Yılan · 3310</div>
  <div class="screen-frame">
    <div class="lcd">
      <div class="hud">
        <span id="score">SKOR 0000</span>
        <span id="hiscore">REKOR 0000</span>
      </div>
      <canvas id="game" width="264" height="264"></canvas>
      <div class="overlay" id="startOverlay">
        <h1>YILAN</h1>
        <p>Yönlendirmek için tuşları,<br>ok tuşlarını veya kaydırmayı kullan</p>
        <p class="blink">▶ BAŞLAMAK İÇİN DOKUN</p>
      </div>
      <div class="overlay hidden" id="gameOverOverlay">
        <h1>OYUN BİTTİ</h1>
        <p id="finalScore"></p>
        <p class="blink">▶ TEKRAR OYNA</p>
      </div>
      <div class="overlay hidden" id="pauseOverlay">
        <h1>DURAKLADI</h1>
        <p class="blink">▶ DEVAM İÇİN DOKUN</p>
      </div>
    </div>
  </div>
  <div class="controls">
    <button class="btn up" data-dir="up">▲</button>
    <button class="btn left" data-dir="left">◀</button>
    <button class="btn mid" id="midBtn">DUR</button>
    <button class="btn right" data-dir="right">▶</button>
    <button class="btn down" data-dir="down">▼</button>
  </div>
  <div class="hint">Klavye: ok tuşları / WASD · Boşluk: duraklat<br>Ekranda kaydırarak da yön verebilirsin</div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const CELL = 12, COLS = 22, ROWS = 22;
  const DARK = '#26301a', MID = '#5a6b42';

  const scoreEl = document.getElementById('score');
  const hiEl = document.getElementById('hiscore');
  const startOv = document.getElementById('startOverlay');
  const overOv = document.getElementById('gameOverOverlay');
  const pauseOv = document.getElementById('pauseOverlay');
  const finalEl = document.getElementById('finalScore');

  let snake, dir, nextDir, food, score = 0, hiscore = 0;
  let running = false, paused = false, dead = false;
  let speed, timer = null;

  function pad(n){ return String(n).padStart(4,'0'); }

  function reset(){
    snake = [{x:10,y:11},{x:9,y:11},{x:8,y:11}];
    dir = {x:1,y:0}; nextDir = dir;
    score = 0; speed = 150; dead = false;
    placeFood();
    updateHud();
  }

  function placeFood(){
    do {
      food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
    } while (snake.some(s => s.x===food.x && s.y===food.y));
  }

  function updateHud(){
    scoreEl.textContent = 'SKOR ' + pad(score);
    hiEl.textContent = 'REKOR ' + pad(hiscore);
  }

  function loop(){
    timer = setTimeout(() => {
      if (running && !paused && !dead){ step(); draw(); }
      loop();
    }, speed);
  }

  function step(){
    dir = nextDir;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
    // Duvarlardan geçiş (wrap)
    head.x = (head.x + COLS) % COLS;
    head.y = (head.y + ROWS) % ROWS;

    if (snake.some(s => s.x===head.x && s.y===head.y)){
      gameOver(); return;
    }
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y){
      score += 10;
      if (score > hiscore) hiscore = score;
      if (speed > 70) speed -= 3;
      placeFood();
      updateHud();
    } else {
      snake.pop();
    }
  }

  function gameOver(){
    dead = true; running = false;
    finalEl.textContent = 'SKOR: ' + pad(score) + '  ·  REKOR: ' + pad(hiscore);
    overOv.classList.remove('hidden');
  }

  function draw(){
    ctx.fillStyle = '#c5d6a4';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // yem: yanıp sönen elmas
    ctx.fillStyle = DARK;
    const fx = food.x*CELL, fy = food.y*CELL, c = CELL/2;
    ctx.beginPath();
    ctx.moveTo(fx+c, fy+1); ctx.lineTo(fx+CELL-1, fy+c);
    ctx.lineTo(fx+c, fy+CELL-1); ctx.lineTo(fx+1, fy+c);
    ctx.closePath(); ctx.fill();

    // yılan: blok gövde, tek piksel boşluklu retro görünüm
    snake.forEach((s,i) => {
      ctx.fillStyle = i===0 ? DARK : (i%2 ? MID : DARK);
      ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
    });
  }

  function setDir(d){
    const map = {up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0}};
    const nd = map[d];
    if (!nd) return;
    if (nd.x === -dir.x && nd.y === -dir.y) return; // geri dönüş yok
    nextDir = nd;
  }

  function start(){
    reset();
    startOv.classList.add('hidden');
    overOv.classList.add('hidden');
    pauseOv.classList.add('hidden');
    running = true; paused = false;
    draw();
  }

  function togglePause(){
    if (!running) return;
    paused = !paused;
    pauseOv.classList.toggle('hidden', !paused);
  }

  // Klavye
  document.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()) || e.key.startsWith('Arrow')) e.preventDefault();
    if (k==='arrowup'||k==='w') setDir('up');
    else if (k==='arrowdown'||k==='s') setDir('down');
    else if (k==='arrowleft'||k==='a') setDir('left');
    else if (k==='arrowright'||k==='d') setDir('right');
    else if (k===' '){
      if (!running) start(); else togglePause();
    }
  });

  // Butonlar
  document.querySelectorAll('.btn[data-dir]').forEach(b => {
    const h = e => { e.preventDefault(); setDir(b.dataset.dir); };
    b.addEventListener('pointerdown', h);
  });
  document.getElementById('midBtn').addEventListener('pointerdown', e => {
    e.preventDefault();
    if (!running && !paused) start(); else togglePause();
  });

  // Kaydırma (swipe)
  let tx=null, ty=null;
  const lcd = document.querySelector('.lcd');
  lcd.addEventListener('touchstart', e => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
  }, {passive:true});
  lcd.addEventListener('touchend', e => {
    if (tx===null) return;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20){
      // dokunma: başlat / devam et
      if (!running) start(); else if (paused) togglePause();
    } else if (Math.abs(dx) > Math.abs(dy)){
      setDir(dx > 0 ? 'right' : 'left');
    } else {
      setDir(dy > 0 ? 'down' : 'up');
    }
    tx = ty = null;
  }, {passive:true});

  // Ekran overlay'lerine tıklama (fare)
  [startOv, overOv].forEach(ov => ov.addEventListener('click', start));
  pauseOv.addEventListener('click', togglePause);

  reset(); draw(); loop();
})();
</script>
</body>
</html>
